name: finance_app_final_v3
description: Finance App with Maneki Neko
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.1.1
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.0
  intl: ^0.20.2
  image: ^4.1.3
  image_picker: ^1.0.4
  excel: ^4.0.6
  share_plus: ^10.1.4
  package_info_plus: ^8.2.0
  url_launcher: ^6.3.2
  reorderables: ^0.6.0
  flex_color_scheme: ^8.3.0
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  image: ^4.1.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/icon_final.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/icon_final.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/maneki-neko.png
    - assets/images/icon_final.png
    - assets/images/neko.png